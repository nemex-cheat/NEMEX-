<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEMEX | GLOBAL CHEAT SYSTEM</title>
    <style>
        :root { --neon: #00ff41; --blue: #00d2ff; --dark: #000; }
        body, html { margin: 0; padding: 0; background: black; color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        
        /* MATRIX GİRİŞ EKRANI */
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: 1000; background: black; transition: opacity 1.5s ease; }

        /* ANA PANEL */
        #ui-layer { 
            display: none; opacity: 0; height: 100vh; flex-direction: column; padding: 15px; 
            background: radial-gradient(circle at center, #001a1a 0%, #000 100%); transition: opacity 1.5s ease;
        }

        /* MERMİ LOGOSU */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); padding-bottom: 10px; }
        .mermi-logo { width: 18px; height: 35px; background: linear-gradient(to right, #999, #fff, #999); border-radius: 50% 50% 2px 2px; box-shadow: 0 0 15px var(--blue); }

        /* DÖNEN DÜNYA VE WELCOME */
        .center-zone { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .globe { width: 100px; height: 100px; border: 1px solid var(--blue); border-radius: 50%; animation: spin 10s linear infinite; box-shadow: inset 0 0 20px var(--blue); }
        @keyframes spin { 100% { transform: rotateY(360deg); } }
        #welcome-text { font-size: 1.5rem; color: white; margin-top: 20px; text-shadow: 0 0 10px var(--blue); font-weight: bold; letter-spacing: 3px; }

        /* TERMİNAL */
        #terminal { height: 120px; background: rgba(0, 40, 0, 0.3); border: 1px solid var(--neon); padding: 10px; font-size: 11px; overflow-y: auto; margin: 15px 0; }

        /* CHEAT BUTONLARI */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: 1px solid var(--blue); color: var(--blue); padding: 12px; text-align: center; background: rgba(0, 210, 255, 0.1); cursor: pointer; font-weight: bold; }
        .btn:active { background: var(--blue); color: black; }
    </style>
</head>
<body onclick="startSystem()">

    <canvas id="matrix-canvas"></canvas>

    <div id="ui-layer">
        <div class="header">
            <div class="mermi-logo"></div>
            <div style="color: var(--blue); font-size: 14px;">NEMEX GLOBAL v5.0</div>
            <div id="clock">00:00</div>
        </div>

        <div class="center-zone">
            <div class="globe"></div>
            <div id="welcome-text">NEMEX SYSTEM ACTIVE</div>
        </div>

        <div id="terminal">
            <div id="logs"></div>
            <span id="cursor">_</span>
        </div>

        <div class="grid">
            <div class="btn" onclick="sendToDB('Cheat Activated')">7/24 CHEAT</div>
            <div class="btn" onclick="sendToDB('User Logged In')">SYSTEM SCAN</div>
            <div class="btn" onclick="sendToDB('Global Access Granted')">DB SYNC</div>
            <div class="btn" style="border-color: red; color: red;">FORCE STOP</div>
        </div>
    </div>

    <script type="module">
        // MATRIX EFEKTİ
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                const text = "01NEMEX"[Math.floor(Math.random()*7)];
                ctx.fillText(text, i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        let mInterval = setInterval(draw, 35);

        // SİSTEM BAŞLATMA
        window.startSystem = function() {
            const canvasEl = document.getElementById('matrix-canvas');
            const uiEl = document.getElementById('ui-layer');
            if(uiEl.style.display === 'flex') return;

            // 2 Saniye sonra geçiş
            setTimeout(() => {
                canvasEl.style.opacity = '0';
                setTimeout(() => {
                    canvasEl.style.display = 'none';
                    uiEl.style.display = 'flex';
                    setTimeout(() => uiEl.style.opacity = '1', 50);
                    addLog("NEMEX Core Loaded...");
                    addLog("Firebase Connection: STABLE");
                    addLog("Global Sync: ENABLED");
                }, 1000);
            }, 1000);
        }

        function addLog(msg) {
            const logs = document.getElementById('logs');
            logs.innerHTML += `<div>> ${msg}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }

        // BURASI DÜNYAYA AÇILAN KAPI (Firebase Bağlantısı)
        // Karsim buradaki firebaseConfig kısmına Firebase Studio'daki ayarlarını yapıştıracaksın!
        window.sendToDB = function(action) {
            addLog("Sending data to cloud: " + action);
            // Buraya firebase kodlarını eklediğimizde gerçek olacak!
            alert("NEMEX: " + action + " sent to global servers!");
        }

        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
        }, 1000);
    </script>
</body>
  </html>
